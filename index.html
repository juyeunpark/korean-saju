<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할머니의 인생 감명서</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <h1>👵 팩폭할머니 사주 감명서</h1>
      <p>Destiny Analysis & Psychological Profile</p>
    </div>

    <div id="input-view" class="input-section">
      <div class="field">
        <label>생년월일 (필수)</label>
        <input type="date" id="birth-date">
      </div>
      <div class="field">
        <label>태어난 시간 (선택)</label>
        <input type="time" id="birth-time">
      </div>
      <div class="field">
        <label>성함</label>
        <input type="text" id="user-name" placeholder="이름이 뭐냐?">
      </div>
      <button class="btn" id="generate-btn">감명서 작성 시작</button>
    </div>

    <div id="report-content">
      <!-- Generated long-form narrative will go here -->
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
