<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Saju Analysis System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <div class="card">
      <header>
        <h1>AI Saju Analyst</h1>
        <p>심리학과 명리학의 결합: 데이터 기반 성격 분석 시스템</p>
      </header>

      <div id="input-view">
        <div class="form-grid">
          <div class="field">
            <label>생년월일 (필수)</label>
            <input type="date" id="birth-date">
          </div>
          <div class="field">
            <label>태어난 시간 (선택)</label>
            <input type="time" id="birth-time">
          </div>
          <div class="field">
            <label>성별</label>
            <select id="gender">
              <option value="none">비공개</option>
              <option value="male">남성</option>
              <option value="female">여성</option>
            </select>
          </div>
          <div class="field">
            <label>분석 강도</label>
            <select id="depth">
              <option value="normal">표준 분석 (Insightful)</option>
              <option value="blunt">현실 자각 (Blunt)</option>
            </select>
          </div>
        </div>
        <button class="btn" id="analyze-btn">데이터 분석 시작</button>
      </div>

      <div id="analysis-view" class="analysis-view">
        <div class="summary-box">
          <h2 id="res-title">분석 결과: [기운]</h2>
          <p id="res-summary">데이터 로딩 중...</p>
        </div>

        <div class="chart-container" id="res-chart">
          <!-- Bars generated by JS -->
        </div>

        <div class="section-grid">
          <div class="ana-card">
            <h3>💪 주요 강점 (Dominant)</h3>
            <div id="res-strengths-tags" style="margin-bottom: 0.5rem;"></div>
            <p id="res-strengths-desc"></p>
          </div>

          <div class="ana-card">
            <h3>⚠️ 취약 지점 (Lacking)</h3>
            <div id="res-lacking-tags" style="margin-bottom: 0.5rem;"></div>
            <p id="res-lacking-desc"></p>
          </div>

          <div class="ana-card comparison">
            <h3>⚖️ 균형 분석 (Balance)</h3>
            <p id="res-balance-desc"></p>
          </div>

          <div class="ana-card">
            <h3>💼 커리어 & 성공운</h3>
            <p id="res-career"></p>
          </div>

          <div class="ana-card">
            <h3>❤️ 관계 & 애정 패턴</h3>
            <p id="res-love"></p>
          </div>

          <div class="ana-card comparison">
            <h3>🚀 미래 확률 예측 (Outlook)</h3>
            <p id="res-future"></p>
          </div>
        </div>

        <button class="btn" id="reset-btn" style="margin-top: 2rem; background: transparent; border: 1px solid var(--border); color: white;">데이터 초기화</button>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
