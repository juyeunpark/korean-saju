<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할머니의 뼈 때리는 인생 상담</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>👵 팩폭할머니 상담소</h1>
    </header>

    <div id="input-view" class="input-container">
      <div class="field">
        <label>생년월일 (필수)</label>
        <input type="date" id="birth-date">
      </div>
      <div class="field">
        <label>태어난 시간 (선택)</label>
        <input type="time" id="birth-time">
      </div>
      <div class="field">
        <label>이름</label>
        <input type="text" id="user-name" placeholder="이름이 뭐냐?">
      </div>
      <button class="btn" id="start-btn">상담 시작하기</button>
    </div>

    <div id="chat-history">
      <!-- Chat bubbles will appear here -->
    </div>

    <div id="typing" class="typing-indicator">할머니가 돋보기 쓰고 계신다...</div>

    <div id="controls" class="next-controls">
      <button class="btn" id="next-btn">그다음은?</button>
      <button class="btn" id="restart-btn" style="background: white; color: var(--text-muted); border: 1px solid #ddd;">다시 하기</button>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
